configuration:
  scale_address:
    name: Scale address
    description: >-
      Optional Bluetooth MAC/UUID to target one specific scale. Leave blank to
      auto-detect a device advertising as "BF720".
  scan_interval:
    name: Scan interval (seconds)
    description: How often to scan for the scale and read measurements (10-3600).
  debug:
    name: Debug logging
    description: Enable verbose logging in the add-on log.
  users:
    name: Users
    description: One entry per on-scale profile you want to read.
    fields:
      name:
        name: Name
        description: Display name for this person's Home Assistant device.
      user_index:
        name: User index
        description: The on-scale profile slot (1, 2, 3 ...).
      pin:
        name: Consent PIN
        description: The 4-digit code the scale shows for this profile.
